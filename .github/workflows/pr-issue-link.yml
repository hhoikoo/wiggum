name: PR Issue Link

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  link-issue:
    name: Link issue from branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const body = pr.body || '';

            // Extract issue number from branch: type/123/slug
            const match = branch.match(/^[^/]+\/(\d+)\//);
            if (!match) {
              console.log('No issue number found in branch name');
              return;
            }

            const issueNum = match[1];
            const resolves = `resolves #${issueNum}`;

            // Skip if body already references this issue
            if (body.includes(`#${issueNum}`)) {
              console.log(`Body already references #${issueNum}`);
              return;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: body ? `${body}\n\n${resolves}` : resolves,
            });
            console.log(`Appended "${resolves}" to PR body`);
