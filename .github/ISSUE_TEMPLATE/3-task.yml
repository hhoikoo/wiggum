name: Task
description: Simple, well-defined work item -- implementation path is obvious.
labels: ["type:task"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Context and details about the work.
    validations:
      required: false
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
    validations:
      required: true
